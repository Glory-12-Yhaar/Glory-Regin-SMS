<div class="stats-row">
  {{statsCards}}
</div>

<div class="g21">
  <div class="card">
    <div class="card-hdr"><span class="card-title"><i class="fas fa-chart-line"></i> Expense Records</span><button class="btn btn-primary btn-sm" onclick="navTo('expense_new')">+ Add Expense</button></div>
    <table class="tbl">
      <thead><tr><th>Date</th><th>Description</th><th>Category</th><th>Amount</th><th>Approved By</th><th>Status</th></tr></thead>
      <tbody>
        {{expenseRows}}
      </tbody>
    </table>
  </div>
  <div class="card">
    <div class="card-hdr"><span class="card-title"><i class="fas fa-bolt"></i> Expense Actions</span></div>
    <p style="font-size:12px;color:var(--gray-600);line-height:1.7">Record operating costs on a dedicated page with validation and database storage.</p>
    <button class="btn btn-primary" style="width:100%" onclick="navTo('expense_new')"><i class="fas fa-plus"></i> Record New Expense</button>
    <button class="btn btn-secondary" style="width:100%;margin-top:8px" onclick="navTo('balance')"><i class="fas fa-balance-scale"></i> View Balance Sheet</button>
  </div>
</div>
