<div class="g2">
  <div class="card">
    <div class="card-hdr">
      <span class="card-title"><i class="fas fa-shield"></i> System Roles</span>
      <button class="btn btn-primary btn-sm" onclick="alert('Opening role creation form...')">+ Add Role</button>
    </div>
    <table class="tbl">
      <thead>
        <tr><th>Role</th><th>Users</th><th>Access Level</th><th>Dashboard</th><th>Status</th><th>Actions</th></tr>
      </thead>
      <tbody>
        {{rolesRows}}
      </tbody>
    </table>
  </div>

  <div class="card">
    <div class="card-hdr">
      <span class="card-title"><i class="fas fa-key"></i> Permission Matrix - Admin Role</span>
    </div>
    <table class="tbl">
      <thead>
        <tr><th>Module</th><th style="text-align:center">View</th><th style="text-align:center">Create</th><th style="text-align:center">Edit</th><th style="text-align:center">Delete</th></tr>
      </thead>
      <tbody>
        {{permissionsRows}}
      </tbody>
    </table>
  </div>
</div>
